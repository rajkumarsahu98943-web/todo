<!DOCTYPE html>
<html>
    <head>
        <title>MY to do list</title>
        <link rel="stylesheet" href="style.css">
        <link rel="icon" type="image/png" href="https://png.pngtree.com/png-vector/20241015/ourmid/pngtree-typography-of-to-do-list-on-transparent-background-png-image_14092385.png">
    </head>
    <body>
         <div class="container">
            <h1 > TO DO LIST </h1>
        <label>
            <input type="text" id="input"  placeholder="Add a new tasks">

            <button onclick="addTask()">ADD TASK</button>

        <ul id="taskList"></ul>
       
    </div>
   
        
  
    <script src="type.js"></script>
    </body>
</html>
